<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="bfr-title bfr-desc" font-family="'JetBrains Mono','IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace">
  <title id="bfr-title">Business Feature Roadmap – worked example</title>
  <desc id="bfr-desc">Gantt-style feature roadmap across four quarters with on-track and at-risk colour coding and dependency arrows linking Identity and SSO, Case deflection bot, and Entitlement checks.</desc>

  <defs>
    <marker id="bfr-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1C1C1A"/>
    </marker>
    <pattern id="bfr-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E8E4D8" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="960" height="560" fill="#F6F4EE"/>
  <rect width="960" height="560" fill="url(#bfr-grid)" opacity="0.6"/>

  <text x="40" y="50" font-size="22" font-weight="700" fill="#1C1C1A">BUSINESS FEATURE ROADMAP</text>
  <text x="40" y="74" font-size="12" fill="#6B6960">audience · product owners and delivery leads · features per quarter · sequenced</text>
  <line x1="40" y1="86" x2="920" y2="86" stroke="#D9D5CB" stroke-width="1"/>

  <!-- Quarter headers -->
  <g font-size="13" font-weight="700" fill="#1C1C1A">
    <text x="220" y="116" text-anchor="middle">Q1</text>
    <text x="410" y="116" text-anchor="middle">Q2</text>
    <text x="600" y="116" text-anchor="middle">Q3</text>
    <text x="790" y="116" text-anchor="middle">Q4</text>
  </g>
  <g stroke="#D9D5CB" stroke-width="1" stroke-dasharray="2,4">
    <line x1="125" y1="128" x2="125" y2="510"/>
    <line x1="315" y1="128" x2="315" y2="510"/>
    <line x1="505" y1="128" x2="505" y2="510"/>
    <line x1="695" y1="128" x2="695" y2="510"/>
    <line x1="885" y1="128" x2="885" y2="510"/>
  </g>

  <!-- Feature bars (y rows every 36px starting 150) -->
  <!-- Row 1: Identity & SSO (Q1) on-track -->
  <rect x="135" y="146" width="240" height="26" rx="13" fill="#1E55C0"/>
  <text x="150" y="164" font-size="12" font-weight="600" fill="#F6F4EE">Identity & SSO</text>

  <!-- Row 2: Knowledge base revamp (Q1 mid → Q2) on-track -->
  <rect x="210" y="182" width="240" height="26" rx="13" fill="#1E55C0"/>
  <text x="225" y="200" font-size="12" font-weight="600" fill="#F6F4EE">Knowledge base revamp</text>

  <!-- Row 3: Portal shell & navigation (Q1 late → Q2) on-track -->
  <rect x="280" y="218" width="220" height="26" rx="13" fill="#1E55C0"/>
  <text x="295" y="236" font-size="12" font-weight="600" fill="#F6F4EE">Portal shell &amp; navigation</text>

  <!-- Row 4: Case deflection bot (Q2) AT RISK -->
  <rect x="345" y="254" width="200" height="26" rx="13" fill="#C2871A"/>
  <text x="360" y="272" font-size="12" font-weight="600" fill="#F6F4EE">Case deflection bot</text>

  <!-- Row 5: Live order status (Q2 late → Q3 early) on-track -->
  <rect x="445" y="290" width="200" height="26" rx="13" fill="#1E55C0"/>
  <text x="460" y="308" font-size="12" font-weight="600" fill="#F6F4EE">Live order status</text>

  <!-- Row 6: Appointment booking (Q3) on-track -->
  <rect x="540" y="326" width="200" height="26" rx="13" fill="#1E55C0"/>
  <text x="555" y="344" font-size="12" font-weight="600" fill="#F6F4EE">Appointment booking</text>

  <!-- Row 7: Entitlement checks (Q3 → Q4) AT RISK -->
  <rect x="620" y="362" width="220" height="26" rx="13" fill="#C2871A"/>
  <text x="635" y="380" font-size="12" font-weight="600" fill="#F6F4EE">Entitlement checks</text>

  <!-- Row 8: CSAT surveys (Q4) on-track -->
  <rect x="720" y="398" width="160" height="26" rx="13" fill="#1E55C0"/>
  <text x="735" y="416" font-size="12" font-weight="600" fill="#F6F4EE">CSAT surveys</text>

  <!-- Row 9: Multilingual rollout (Q4) on-track -->
  <rect x="745" y="434" width="135" height="26" rx="13" fill="#1E55C0"/>
  <text x="760" y="452" font-size="12" font-weight="600" fill="#F6F4EE">Multilingual rollout</text>

  <!-- Dependency arrows -->
  <!-- Identity & SSO → Case deflection bot -->
  <path d="M 375 159 C 430 159, 380 267, 345 267" fill="none" stroke="#1C1C1A" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#bfr-arrow)"/>
  <!-- Case deflection bot → Entitlement checks -->
  <path d="M 545 267 C 620 267, 580 375, 620 375" fill="none" stroke="#1C1C1A" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#bfr-arrow)"/>

  <!-- Legend -->
  <g transform="translate(40,490)" font-size="11" fill="#1C1C1A">
    <rect x="0" y="0" width="22" height="12" rx="6" fill="#1E55C0"/>
    <text x="30" y="10">on track</text>
    <rect x="110" y="0" width="22" height="12" rx="6" fill="#C2871A"/>
    <text x="140" y="10">at risk</text>
    <line x1="210" y1="6" x2="245" y2="6" stroke="#1C1C1A" stroke-width="1.2" stroke-dasharray="4,4"/>
    <text x="255" y="10">dependency</text>
  </g>

  <text x="920" y="540" font-size="10" fill="#6B6960" text-anchor="end" font-style="italic">Roadmapping for Success · Business Feature Roadmap</text>
</svg>
