<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="anti-title anti-desc" font-family="'JetBrains Mono','IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace">
  <title id="anti-title">roadmap_final_v7_FINAL(2).pptx — the anti-pattern</title>
  <desc id="anti-desc">Deliberately chaotic roadmap with overlapping bars, vague labels, looping dependencies, out-of-order quarters, and ASAP, TBD and question-mark sticky notes.</desc>

  <defs>
    <marker id="anti-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1C1C1A"/>
    </marker>
    <pattern id="anti-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E8E4D8" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="960" height="560" fill="#F6F4EE"/>
  <rect width="960" height="560" fill="url(#anti-grid)" opacity="0.6"/>

  <text x="40" y="50" font-size="22" font-weight="700" fill="#1C1C1A">roadmap_final_v7_FINAL(2).pptx</text>
  <text x="40" y="74" font-size="12" fill="#6B6960">audience · nobody · purpose · unclear · status · "we're in good shape"</text>
  <line x1="40" y1="86" x2="920" y2="86" stroke="#D9D5CB" stroke-width="1"/>

  <!-- Quarters out of order, mis-labelled -->
  <g font-size="13" font-weight="700" fill="#1C1C1A">
    <text x="190" y="118" text-anchor="middle">Q1</text>
    <text x="390" y="118" text-anchor="middle">Q3?</text>
    <text x="580" y="118" text-anchor="middle">Q2</text>
    <text x="780" y="118" text-anchor="middle">??</text>
  </g>
  <g stroke="#D9D5CB" stroke-width="1" stroke-dasharray="2,4">
    <line x1="95" y1="128" x2="95" y2="500"/>
    <line x1="285" y1="128" x2="285" y2="500"/>
    <line x1="485" y1="128" x2="485" y2="500"/>
    <line x1="685" y1="128" x2="685" y2="500"/>
    <line x1="875" y1="128" x2="875" y2="500"/>
  </g>

  <!-- Overlapping bars in mismatched colours -->
  <!-- CRM thing phase 1? -->
  <rect x="120" y="150" width="220" height="30" rx="15" fill="#A8B0BC"/>
  <text x="135" y="170" font-size="12" font-weight="600" fill="#1C1C1A">CRM thing phase 1?</text>

  <!-- Big Integration -->
  <rect x="265" y="182" width="320" height="30" rx="15" fill="#D7B254"/>
  <text x="280" y="202" font-size="12" font-weight="600" fill="#1C1C1A">Big Integration</text>

  <!-- Data clean-up again -->
  <rect x="120" y="214" width="240" height="30" rx="15" fill="#B26C6C"/>
  <text x="135" y="234" font-size="12" font-weight="600" fill="#F6F4EE">Data clean-up again</text>

  <!-- AI something -->
  <rect x="345" y="246" width="200" height="30" rx="15" fill="#A88DBD"/>
  <text x="360" y="266" font-size="12" font-weight="600" fill="#F6F4EE">AI something</text>

  <!-- Portal v2 v3 -->
  <rect x="265" y="278" width="280" height="30" rx="15" fill="#7DAF8A"/>
  <text x="280" y="298" font-size="12" font-weight="600" fill="#F6F4EE">Portal v2 v3</text>

  <!-- Quick wins -->
  <rect x="505" y="310" width="200" height="30" rx="15" fill="#D49887"/>
  <text x="520" y="330" font-size="12" font-weight="600" fill="#F6F4EE">Quick wins</text>

  <!-- Everything else -->
  <rect x="120" y="342" width="380" height="30" rx="15" fill="#9E9E9E"/>
  <text x="135" y="362" font-size="12" font-weight="600" fill="#F6F4EE">Everything else</text>

  <!-- Reporting?? -->
  <rect x="700" y="374" width="200" height="30" rx="15" fill="#C49032"/>
  <text x="715" y="394" font-size="12" font-weight="600" fill="#F6F4EE">Reporting??</text>

  <!-- Looping dependency arrows -->
  <path d="M 340 165 C 480 130, 520 240, 405 261" fill="none" stroke="#1C1C1A" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#anti-arrow)"/>
  <path d="M 410 276 C 350 320, 280 290, 240 244" fill="none" stroke="#1C1C1A" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#anti-arrow)"/>
  <path d="M 545 293 C 640 280, 600 330, 690 320" fill="none" stroke="#1C1C1A" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#anti-arrow)"/>
  <path d="M 500 357 C 700 340, 750 360, 800 380" fill="none" stroke="#1C1C1A" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#anti-arrow)"/>

  <!-- Sticky notes -->
  <g transform="translate(60,260) rotate(-6)">
    <rect x="0" y="0" width="80" height="60" fill="#F4C2C2" stroke="#1C1C1A" stroke-width="0.6"/>
    <text x="40" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1C1C1A">ASAP!!</text>
  </g>
  <g transform="translate(770,210) rotate(8)">
    <rect x="0" y="0" width="70" height="60" fill="#F6D77A" stroke="#1C1C1A" stroke-width="0.6"/>
    <text x="35" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1C1C1A">?</text>
  </g>
  <g transform="translate(620,395) rotate(-4)">
    <rect x="0" y="0" width="80" height="60" fill="#A9D0F5" stroke="#1C1C1A" stroke-width="0.6"/>
    <text x="40" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#1C1C1A">TBD</text>
  </g>

  <!-- Annotations -->
  <text x="40" y="475" font-size="11" fill="#6B6960" font-style="italic">no audience · no business value statement · no sequencing · no dependencies that survive contact with reality</text>
  <text x="40" y="492" font-size="11" fill="#6B6960" font-style="italic">but it has v7 in the filename, so we are sure it is the final version this time</text>

  <text x="920" y="540" font-size="10" fill="#6B6960" text-anchor="end" font-style="italic">Roadmapping for Success · Anti-Pattern</text>
</svg>
